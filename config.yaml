# Image Retrieval System — single source of truth for all settings
# Run: uv run image-ret

mode: search   #index or search

database_dir: data/database
query_image: /Users/muditmathur/Desktop/Code/projects/experiments/image_ret/data/query/imagec2.png
# query_image: data/query/da1e89447a2f414fb45f06caace5323b.jpg

index_dir: data/index # location to search for index
top_k: 3
threshold: 0.5 # lower cosine dist. == more similar; matches with distance <= threshold pass

version: 3   # which index to load
supported_extensions:       # only these file types are supported in indexing
  - .png
  - .jpg
  - .jpeg
  - .webp

model: vit_l_16
# Available models 
#   vit_b_32  →  768-d  → fastest, good for prototyping or large datasets
#   vit_b_16  →  768-d  → balanced speed and accuracy
#   vit_l_32  → 1024-d  → higher quality, still reasonable speed
#   vit_l_16  → 1024-d  → best accuracy for most use cases (recommended)
#   vit_h_14  → 1280-d  → highest quality, slowest, needs most RAM
